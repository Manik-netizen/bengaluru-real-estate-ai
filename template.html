<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengaluru Real Estate AI</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e2f72 0%, #2a5298 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .app-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #1e3c72;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0a0f17a7;
        }
        .btn-predict {
            width: 100%;
            padding: 14px;
            background: #6135e399;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 6px rgba(58, 111, 226, 0.4);
        }
        .btn-predict:hover {
            background: #8054b693;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: none;
            background: #e8f8f5;
            color: #117a65;
            border: 1px solid #a3e4d7;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h2>🏡 Bengaluru Price Predictor</h2>
    <p class="subtitle">User friendly interface for evaluation</p>
    
    <div class="form-group">
        <label>Total Area (Square Feet)</label>
        <input type="number" id="sqft" value="1000" min="300" max="10000">
    </div>

    <div class="form-group">
        <label>Bedrooms (BHK)</label>
        <select id="bhk">
            <option value="1">1 BHK</option>
            <option value="2" selected>2 BHK</option>
            <option value="3">3 BHK</option>
            <option value="4">4 BHK</option>
            <option value="5">5 BHK</option>
        </select>
    </div>

    <div class="form-group">
        <label>Bathrooms</label>
        <select id="bath">
            <option value="1">1 Bathroom</option>
            <option value="2" selected>2 Bathrooms</option>
            <option value="3">3 Bathrooms</option>
            <option value="4">4 Bathrooms</option>
        </select>
    </div>

    <div class="form-group">
        <label>Select Location</label>
        <select id="location">
            {% for loc in locations %}
                <option value="{{ loc }}">{{ loc }}</option>
            {% endfor %}
        </select>
    </div>

    <button class="btn-predict" onclick="sendPredictionRequest()">Calculate Valuation</button>

    <div id="output" class="result-box"></div>
</div>

<script>
    async function sendPredictionRequest() {
        const sqft = document.getElementById('sqft').value;
        const bhk = document.getElementById('bhk').value;
        const bath = document.getElementById('bath').value;
        const location = document.getElementById('location').value;

        const outputDiv = document.getElementById('output');
        outputDiv.style.display = 'block';
        outputDiv.innerHTML = "Processing Engine...";

        // JavaScript Fetch API calling our Flask backend route
        const response = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                total_sqft: sqft,
                bhk: bhk,
                bath: bath,
                location: location
            })
        });

        const result = await response.json();
        outputDiv.innerHTML = `Estimated Price: ₹ ${result.estimated_price} Lakhs`;
    }
</script>

</body>
</html>
